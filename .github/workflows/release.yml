name: Release

# Automated releases via semantic-release. On every push to main it reads the
# GitMoji in the commits since the last release (✨ → minor, 🐛 → patch,
# 💥 → major; chore/docs/ci → no release), and when a release is warranted:
#   1. bumps the version across the workspace + AGENT_VERSION (release-set-version.mjs)
#   2. commits that + tags vX.Y.Z + creates the GitHub Release (notes from the commits)
#   3. calls publish-image.yml to build & push the multi-arch image for the tag
#
# No PAT needed: publish runs as a downstream job in this same run (a tag pushed
# by GITHUB_TOKEN can't trigger publish-image.yml on its own).
#
# Requires `main` to accept direct pushes from github-actions[bot] (no branch
# protection that blocks it), since semantic-release pushes the release commit.

on:
  push:
    branches: [main]

# semantic-release needs to push the release commit/tag, cut a GitHub Release,
# and comment on the released PRs/issues.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so semantic-release can analyse commits
          persist-credentials: true # keep the token so it can push the release commit/tag

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            semantic-release-gitmoji
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build & push the image for the freshly-cut tag — only when a release happened.
  publish:
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/publish-image.yml
    with:
      version: v${{ needs.release.outputs.version }}
