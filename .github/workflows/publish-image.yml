name: Publish agent image

# Builds the FeckBills agent container and pushes it to the GitHub Container
# Registry (GHCR) — the public image that `/console/deploy` and the docs point
# Cloud Run / k8s / `docker run` at.
#
# Triggers:
#   - push a version tag  (v1.2.3)  → tagged + `latest` release
#   - manual run          (Actions → Run workflow) → `latest` + short SHA
#
# First run note: GHCR creates the package as PRIVATE. After the first push,
# make it public once: GitHub → org Packages → feckbills-agent → Package
# settings → Change visibility → Public. (Cloud Run pulls a public image.)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/feckbills/feckbills-agent # GHCR names must be lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
