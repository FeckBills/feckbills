name: Publish agent image

# Builds the FeckBills agent container and pushes it to the GitHub Container
# Registry (GHCR) — the public image that `/console/deploy` and the docs point
# Cloud Run / k8s / `docker run` at.
#
# Triggers:
#   - called by release.yml after a semantic-release tag → the normal path
#   - push a version tag  (v1.2.3)  → tagged + `latest` release (manual hotfix)
#   - manual run: pick the *tag* in "Use workflow from" so semver resolves
#     (running from `main` with no version only produces a short-SHA image)
#
# First run note: GHCR creates the package as PRIVATE. After the first push,
# make it public once: GitHub → org Packages → feckbills-agent → Package
# settings → Change visibility → Public. (Cloud Run pulls a public image.)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
  # Called by release.yml after it tags a release, so the image builds in the
  # same run (no PAT needed). `version` is the tag to check out and label, e.g.
  # v1.2.3.
  workflow_call:
    inputs:
      version:
        description: Tag to build (e.g. v1.2.3)
        type: string
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ inputs.version || github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/feckbills/feckbills-agent # GHCR names must be lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a workflow_call/dispatch with a version, build that exact tag;
          # on a tag push, build the pushed tag (the default ref).
          ref: ${{ inputs.version || github.ref }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # latest=auto → a semver build also publishes `:latest`. The `value=`
          # override feeds the version explicitly so semver extraction works
          # whether triggered by a tag push (github.ref_name) or a workflow_call
          # (inputs.version). /console/deploy points at `:latest`.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version || github.ref_name }}
            type=sha,format=short

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
