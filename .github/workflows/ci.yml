name: CI

# Typecheck, test and build on every push to main and every PR into it.
# (The image is published separately by publish-image.yml on a version tag.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads the pnpm version from package.json#packageManager.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first: @feckbills/core's dist is gitignored, and the cli's
      # typecheck/tests resolve @feckbills/core from its built output.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test
